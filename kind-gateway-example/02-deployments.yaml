apiVersion: apps/v1
kind: Deployment
metadata:
  name: team-a-v1
  namespace: apps
  labels:
    app: team-a
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: team-a
      version: v1
  template:
    metadata:
      labels:
        app: team-a
        version: v1
    spec:
      containers:
      - name: http-echo
        image: hashicorp/http-echo:1.0.0
        args:
        - "-listen=:8080"
        - "-text=Hello from team-a v1"
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 20m
            memory: 32Mi
          limits:
            memory: 64Mi
---
